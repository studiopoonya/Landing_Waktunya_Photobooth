name: Deploy Landing Page to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            APP_DIR="/www/wwwroot/waktunyaphotobooth.com"

            echo "=== [1/5] Pull latest code ==="
            git config --global --add safe.directory "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git checkout -- .
              git pull origin main
            else
              git clone https://github.com/studiopoonya/Landing_Waktunya_Photobooth.git "$APP_DIR"
            fi

            echo "=== [2/5] Build frontend ==="
            cd "$APP_DIR/frontend"
            chattr -i dist/.user.ini 2>/dev/null || true
            rm -rf dist
            npm ci --silent
            npm run build

            echo "=== [3/5] Install PHP dependencies ==="
            cd "$APP_DIR/backend"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "=== [4/5] Run migrations ==="
            php artisan migrate --force

            echo "=== [5/5] Cache config & routes ==="
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chmod -R 775 storage bootstrap/cache

            echo "=== Deploy selesai! ==="
