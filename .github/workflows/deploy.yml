name: Deploy Landing Page to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        env:
          HOME: /root
        run: |
          APP_DIR="/www/wwwroot/waktunyaphotobooth.com"
          git config --global --add safe.directory "$APP_DIR"
          cd "$APP_DIR"
          git checkout -- .
          git pull origin main

      - name: Build frontend
        run: |
          cd /www/wwwroot/waktunyaphotobooth.com/frontend
          chattr -i dist/.user.ini 2>/dev/null || true
          rm -rf dist
          npm ci --silent
          npm run build

      - name: Install PHP dependencies
        run: |
          cd /www/wwwroot/waktunyaphotobooth.com/backend
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Run migrations
        run: |
          cd /www/wwwroot/waktunyaphotobooth.com/backend
          php artisan migrate --force

      - name: Cache config & routes
        run: |
          cd /www/wwwroot/waktunyaphotobooth.com/backend
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          chmod -R 775 storage bootstrap/cache
