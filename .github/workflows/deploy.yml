name: Deploy Landing Page to VPS

on:
  push:
    branches:
      - main  # Atau ganti master jika branch utamamu namanya master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Membuat folder project di VPS jika belum ada
            mkdir -p /www/wwwroot/waktunyaphotobooth.com
            
            # Masuk ke folder tujuan
            cd /www/wwwroot/waktunyaphotobooth.com
            
            # Tarik kodingan terbaru langsung di dalam VPS
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/studiopoonya/Landing_Waktunya_Photobooth.git .
            fi